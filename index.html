<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie PLayer 1.1</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="player" id="player">

        <video id="video"></video>

        <input type="file" id="fileInput" accept="video/*" hidden>

        <!-- Pantalla inicial / vacía: invita a seleccionar un video -->
        <div class="empty-state" id="emptyState">
            <div class="empty-state-icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5z" />
                </svg>
            </div>
            <p class="empty-state-title">Selecciona un video para reproducir</p>
            <p class="empty-state-subtitle">Haz clic aquí o arrastra un archivo de video</p>
        </div>

        <!-- Barra superior con el título del video, estilo YouTube -->
        <div class="top-bar" id="topBar">
            <span id="videoTitle"></span>
        </div>

        <!-- Botón grande central de play (estilo YouTube cuando el video está pausado) -->
        <button class="big-play" id="bigPlay" aria-label="Reproducir">
            <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z" />
            </svg>
        </button>

        <!-- Icono central que aparece brevemente al pausar/reproducir con un clic en el video -->
        <div class="center-flash" id="centerFlash">
            <svg id="centerFlashIcon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z" />
            </svg>
        </div>

        <!-- Spinner de carga -->
        <div class="spinner" id="spinner"></div>

        <div class="overlay-controls" id="controls">

            <!-- Barra de progreso personalizada estilo YouTube -->
            <div class="progress-bar" id="progressBar">
                <div class="progress-tooltip" id="progressTooltip">00:00</div>
                <div class="progress-track">
                    <div class="progress-buffered" id="bufferedBar"></div>
                    <div class="progress-played" id="playedBar">
                        <div class="progress-thumb"></div>
                    </div>
                </div>
            </div>

            <div class="bottom-controls">

                <div class="left-controls">

                    <button id="play" class="control-btn" aria-label="Reproducir">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M8 5v14l11-7z" />
                        </svg>
                    </button>

                    <button id="back" class="control-btn" aria-label="Retroceder 10 segundos">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" />
                        </svg>
                        <span class="seek-label">10</span>
                    </button>

                    <button id="forward" class="control-btn" aria-label="Avanzar 10 segundos">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <g transform="translate(24,0) scale(-1,1)">
                                <path
                                    d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z" />
                            </g>
                        </svg>
                        <span class="seek-label">10</span>
                    </button>

                    <div class="volume-container" id="volumeContainer">
                        <button id="volumeBtn" class="control-btn" aria-label="Silenciar">
                            <svg id="volumeIconHigh" viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" />
                            </svg>
                            <svg id="volumeIconMute" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                                <path
                                    d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73 4.27 3z" />
                            </svg>
                        </button>

                        <input type="range" id="volume" min="0" max="1" step="0.01" value="1">
                    </div>

                    <span id="time" class="time-display">00:00 / 00:00</span>

                </div>

                <div class="right-controls">

                    <button id="openFileBtn" class="control-btn" aria-label="Abrir archivo de video">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path
                                d="M10 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z" />
                        </svg>
                    </button>

                    <div class="settings-container" id="settingsContainer">
                        <button id="settings" class="control-btn" aria-label="Configuración">
                            <svg viewBox="0 0 24 24" fill="currentColor">
                                <path
                                    d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
                            </svg>
                        </button>

                        <div class="settings-menu" id="settingsMenu">
                            <div class="settings-menu-title">Velocidad de reproducción</div>
                            <button class="speed-option" data-speed="0.25">0.25x</button>
                            <button class="speed-option" data-speed="0.5">0.5x</button>
                            <button class="speed-option" data-speed="0.75">0.75x</button>
                            <button class="speed-option active" data-speed="1">Normal</button>
                            <button class="speed-option" data-speed="1.25">1.25x</button>
                            <button class="speed-option" data-speed="1.5">1.5x</button>
                            <button class="speed-option" data-speed="2">2x</button>
                        </div>
                    </div>

                    <button id="fullscreen" class="control-btn" aria-label="Pantalla completa">
                        <svg id="fullscreenIconOpen" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z" />
                        </svg>
                        <svg id="fullscreenIconClose" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                            <path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z" />
                        </svg>
                    </button>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
